<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Redirect</title>
    <script>
      const path = window.location.pathname;
      if (path !== '/') {
        window.location = '/?redirect=' + encodeURIComponent(path);
      }
    </script>
  </head>
  <body></body>
</html>
